name: CI

on:
  push:
  pull_request:

env:
  MONGODB_URI: mongodb://localhost:27017/HockeyTracker
  S3_ENDPOINT: http://localhost:9000
  S3_BUCKET: warriors-local
  S3_ACCESS_KEY_ID: minioadmin
  S3_SECRET_ACCESS_KEY: minioadmin

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  unit:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  integration:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - name: Start Docker services (Mongo + MinIO, seeded)
        run: bash scripts/wait-for-docker-services.sh
      - run: npm run test:integration
      - name: Tear down services
        if: always()
        run: docker compose down -v

  e2e:
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - name: Start Docker services (Mongo + MinIO, seeded)
        run: bash scripts/wait-for-docker-services.sh
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          CI: true
      - name: Tear down services
        if: always()
        run: docker compose down -v
      - name: Upload Playwright report and artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
